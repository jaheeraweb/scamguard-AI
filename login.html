<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Scam Detection</title>
    
    <!-- Keeping your Flask link, but commenting it out so the internal CSS takes precedence for preview -->
    <!-- <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> -->
    
    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --primary: #2563eb;       /* Royal Blue */
            --primary-hover: #1d4ed8;
            --text-main: #1e293b;     /* Slate 800 */
            --text-muted: #64748b;    /* Slate 500 */
            --bg-body: #f8fafc;       /* Very Light Slate */
            --bg-white: #ffffff;
            --border: #e2e8f0;
            --input-bg: #f8fafc;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --radius: 16px;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* --- BACKGROUND DECORATION --- */
        .bg-decoration {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, rgba(255,255,255,0) 70%);
            top: -100px;
            right: -100px;
            z-index: 0;
            pointer-events: none;
        }

        .bg-decoration.bottom {
            top: auto;
            bottom: -100px;
            right: auto;
            left: -100px;
            background: radial-gradient(circle, rgba(6,182,212,0.08) 0%, rgba(255,255,255,0) 70%);
        }

        /* --- LOGIN CARD --- */
        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            z-index: 1;
        }

        .login-card {
            background: var(--bg-white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-xl);
            padding: 40px;
            border: 1px solid white;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background: #eff6ff;
            color: var(--primary);
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .header h2 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* --- FORM ELEMENTS --- */
        .form-group {
            margin-bottom: 20px;
        }

        .label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 20px;
            height: 20px;
            pointer-events: none;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px 12px 44px; /* Left padding for icon */
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            background-color: var(--input-bg);
            transition: var(--transition);
            font-family: inherit;
            outline: none;
            color: var(--text-main);
        }

        .input-field::placeholder {
            color: #94a3b8;
        }

        .input-field:focus {
            background-color: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* Password Toggle */
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .toggle-password:hover {
            color: var(--text-main);
        }

        /* Actions Row */
        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .checkbox-wrapper input {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
        }

        .forgot-link {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider span {
            padding: 0 12px;
        }

        /* Social Login */
        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn-social {
            background: white;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .btn-social:hover {
            background-color: #f8fafc;
            border-color: #cbd5e1;
        }

        .btn-social svg {
            width: 20px;
            height: 20px;
        }

        /* Footer */
        .footer-text {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-text a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>

    <!-- Decorative Backgrounds -->
    <div class="bg-decoration"></div>
    <div class="bg-decoration bottom"></div>

    <div class="login-wrapper">
        <div class="login-card">
            
            <!-- Logo & Header -->
            <div class="header">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                </div>
                <h2>Welcome Back</h2>
                <p>Enter your credentials to access the dashboard</p>
            </div>

            <!-- Login Form -->
            <!-- Added ID for JS handling, kept method="POST" for Flask compatibility -->
            <form id="loginForm" method="POST" action="/login">
                
                <div class="form-group">
                    <label class="label" for="email">Email Address</label>
                    <div class="input-wrapper">
                        <!-- Mail Icon -->
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input type="email" id="email" name="email" class="input-field" placeholder="name@company.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="label" for="password">Password</label>
                    <div class="input-wrapper">
                        <!-- Lock Icon -->
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="password" name="password" class="input-field" placeholder="••••••••" required>
                        
                        <!-- Eye Toggle Icon -->
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Remember & Forgot -->
                <div class="form-actions">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span class="btn-text">Sign In</span>
                    <div class="spinner"></div>
                </button>
            </form>
            

            <!-- Register Link -->
            <p class="footer-text">
                Don't have an account? <a href="/register">Create Account</a>
            </p>
        </div>
    </div>

    <!-- Internal JavaScript for Interaction -->
    <script>
        // Toggle Password Visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                // Change icon to 'eye-off'
                eyeIcon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M1 1l22 22"></path>`;
            } else {
                passwordInput.type = 'password';
                // Change icon back to 'eye'
                eyeIcon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
            }
        }

        // Simulate Form Submission Loading State
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            // If you want to prevent actual submission for the demo:
            // e.preventDefault(); 
            // Remove the line above to let it submit to Flask normally.

            const btn = document.getElementById('submitBtn');
            const btnText = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.spinner');

            // Show loading state
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            btn.style.pointerEvents = 'none'; // Prevent double click
            btn.style.opacity = '0.8';
        });
    </script>
</body>
</html>
