<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Scam Detection</title>
    
    <!-- Flask Stylesheet -->
    <!-- <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> -->
    
    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --primary: #2563eb;       /* Royal Blue */
            --primary-hover: #1d4ed8;
            --accent: #06b6d4;        /* Cyan */
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --border: #e2e8f0;
            --input-bg: #f1f5f9;
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --radius: 16px;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-light);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- SPLIT LAYOUT CONTAINER --- */
        .auth-container {
            display: flex;
            width: 100%;
            max-width: 1100px;
            min-height: 700px;
            background: var(--bg-white);
            border-radius: 24px;
            box-shadow: var(--shadow-xl);
            overflow: hidden;
            margin: 20px;
        }

        /* --- LEFT SIDE: BRANDING --- */
        .brand-section {
            flex: 1;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Abstract background shapes */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
        }
        .c1 { width: 300px; height: 300px; top: -50px; left: -50px; }
        .c2 { width: 200px; height: 200px; bottom: 50px; right: -50px; background: rgba(37, 99, 235, 0.2); }

        .brand-content {
            position: relative;
            z-index: 2;
        }

        .brand-logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: white;
        }

        .brand-text h2 {
            font-size: 2.5rem;
            line-height: 1.2;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-text p {
            font-size: 1.1rem;
            color: #94a3b8;
            line-height: 1.6;
        }

        /* --- RIGHT SIDE: FORM --- */
        .form-section {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
        }

        .form-header {
            margin-bottom: 32px;
        }

        .form-header h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-header p {
            color: var(--text-muted);
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-group {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 20px;
            height: 20px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background-color: var(--input-bg);
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            background-color: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* Password Strength Meter */
        .strength-meter {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
            display: flex;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .strength-text {
            font-size: 0.8rem;
            margin-top: 4px;
            text-align: right;
            color: var(--text-muted);
            min-height: 1.2em;
        }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            margin-top: 3px;
            accent-color: var(--primary);
        }

        .checkbox-group a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }

        .btn-submit:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        /* Footer Link */
        .form-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .form-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .auth-container {
                flex-direction: column;
                margin: 0;
                border-radius: 0;
                min-height: 100vh;
                box-shadow: none;
            }
            .brand-section {
                padding: 40px;
                min-height: 250px;
            }
            .form-section {
                padding: 40px 24px;
            }
            .brand-text h2 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        
        <!-- LEFT SIDE: BRANDING -->
        <div class="brand-section">
            <div class="circle c1"></div>
            <div class="circle c2"></div>
            
            <div class="brand-content">
                <div class="brand-logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                    ScamGuard AI
                </div>
                <div class="brand-text">
                    <h2>Join the Community</h2>
                    <p>Create an account to start using our advanced AI protection. Keep your digital life safe from phishing and fraud.</p>
                </div>
            </div>
        </div>

        <!-- RIGHT SIDE: FORM -->
        <div class="form-section">
            <div class="form-header">
                <h2>Create Account</h2>
                <p>Enter your details to get started for free.</p>
            </div>

            <!-- Registration Form -->
            <!-- Added ID for JS, kept method/fields for Flask -->
            <form id="registerForm" method="POST" action="/register">
                
                <!-- Name Input -->
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <div class="input-group">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" id="name" name="name" class="form-input" placeholder="e.g. John Doe" required>
                    </div>
                </div>

                <!-- Email Input -->
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="input-group">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input type="email" id="email" name="email" class="form-input" placeholder="name@company.com" required>
                    </div>
                </div>

                <!-- Password Input -->
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-group">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="password" name="password" class="form-input" placeholder="Create a strong password" required onkeyup="checkStrength()">
                    </div>
                    <!-- Strength Meter -->
                    <div class="strength-meter">
                        <div id="strengthBar" class="strength-bar"></div>
                    </div>
                    <div id="strengthText" class="strength-text"></div>
                </div>

                <!-- Terms & Conditions -->
                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit" id="submitBtn">
                    <span class="btn-text">Create Account</span>
                    <!-- Simple SVG Spinner (Hidden by default) -->
                    <svg class="spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:none; animation: spin 1s linear infinite;">
                        <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
                    </svg>
                </button>
            </form>

            <div class="form-footer">
                Already have an account? <a href="/login">Login here</a>
            </div>
        </div>
    </div>

    <style>
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>

    <script>
        // Password Strength Logic
        function checkStrength() {
            const input = document.getElementById('password');
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            const val = input.value;
            
            let strength = 0;
            
            if (val.length > 5) strength += 1;
            if (val.length > 7) strength += 1;
            if (/[A-Z]/.test(val)) strength += 1;
            if (/[0-9]/.test(val)) strength += 1;
            if (/[^A-Za-z0-9]/.test(val)) strength += 1;

            let color = '#e2e8f0';
            let width = '0%';
            let message = '';

            switch(strength) {
                case 0:
                case 1:
                    color = '#ef4444'; // Red
                    width = '20%';
                    message = 'Weak';
                    break;
                case 2:
                    color = '#f59e0b'; // Orange
                    width = '40%';
                    message = 'Fair';
                    break;
                case 3:
                    color = '#f59e0b'; // Orange
                    width = '60%';
                    message = 'Good';
                    break;
                case 4:
                    color = '#10b981'; // Green
                    width = '80%';
                    message = 'Strong';
                    break;
                case 5:
                    color = '#059669'; // Dark Green
                    width = '100%';
                    message = 'Excellent';
                    break;
            }

            if (val.length === 0) {
                width = '0%';
                message = '';
            }

            bar.style.width = width;
            bar.style.backgroundColor = color;
            text.textContent = message;
            text.style.color = color;
        }

        // Form Submission Loading State
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const btn = document.getElementById('submitBtn');
            const btnText = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.spinner');
            
            // UI Feedback
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            btn.disabled = true;
            btn.style.opacity = '0.7';
        });
    </script>
</body>
</html>
